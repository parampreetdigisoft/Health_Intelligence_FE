					class="dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false"
					[disabled]="isExporting || selectedCountries.length < 1" class="common_button">
					Report
					<ng-container *ngIf="!isExporting">
						<div class="export-icon-wrapper">
							<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="#ffffff"
								viewBox="0 0 256 256" class="ms-1">
								<path
									d="M216,112v96a16,16,0,0,1-16,16H56a16,16,0,0,1-16-16V112A16,16,0,0,1,56,96H80a8,8,0,0,1,0,16H56v96H200V112H176a8,8,0,0,1,0-16h24A16,16,0,0,1,216,112ZM93.66,69.66,120,43.31V136a8,8,0,0,0,16,0V43.31l26.34,26.35a8,8,0,0,0,11.32-11.32l-40-40a8,8,0,0,0-11.32,0l-40,40A8,8,0,0,0,93.66,69.66Z">
								</path>
							</svg>
							<span *ngIf="selectedCountries.length > 0" class="export-count">
								{{ selectedCountries.length }}
							</span>
						</div>
					</ng-container>
					<p *ngIf="isExporting" class="btn_spinnerForAll">
						<span class="spinner-border spinner-border-sm ms-2"></span>
					</p>
				</button>
				<ul class="dropdown-menu">
					<li>
						<a class="dropdown-item" style="cursor:pointer" (click)="aiAllCountryDetailsReport('pdf')">
							Download PDF
						</a>
					</li>
					<li>
						<a class="dropdown-item" style="cursor:pointer" (click)="aiAllCountryDetailsReport('docx')">
							Download DOCX
						</a>
					</li>
				</ul>
			</div>
		</div>

	</div>
</div>





<div class="table_outer compare_tbl">
	<table class="table table-striped">
		<thead>
			<tr>
				<th>S.No.</th>
				<th>Country</th>
				<th>Continent</th>
				<th>Region</th>
				<th>Score</th>
				<th class="action-header">
					<div class="action-header-content">
						<span>Actions</span>
						<input [checked]="isAllCurrentPageSelected" *ngIf="tier>1"
							[indeterminate]="isSomeCurrentPageSelected" (change)="AllCountrySelected($event)"
							type="checkbox" class="global_Checkbox">
					</div>
				</th>



			</tr>
		</thead>
		<tbody>
			<tr *ngFor="let country of countriesResponse?.data; let i = index">
				<td>
					{{ (currentPage - 1) * pageSize + (i + 1) }}
				</td>





				<td>{{ country.countryName }}</td>
				<td>{{ country.continent }}</td>
				<td>{{ country.region }}</td>
				<td>
					<span class="bold_num">
						{{ country.score?.toFixed(2) || 'NA' }}
					</span>
				</td>
				<td class="action_td">
					<table>
						<tbody>
							<tr>
								<td>
									<div [matTooltip]="tier>1 ? '':'Upgrade your plan to access this feature'">
										<input [disabled]="tier<=1" [checked]="country.selected"
											(change)="CountrySelected($event, country)" type="checkbox">
									</div>
								</td>
							</tr>
						</tbody>
					</table>
				</td>
			</tr>
		</tbody>
	</table>
	<app-pagination [totalPage]="totalRecords" [currentPage]="currentPage" [pageSize]="pageSize" [isLoader]="isLoader"
		(pageChange)="getCountries($event)"></app-pagination>
</div>
